services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: cat-service-db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "${SA_PASSWORD}" -Q "SELECT 1" -C -b -o /dev/null
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: src/Api/Dockerfile
    container_name: cat-service-api
    restart: unless-stopped
    ports:
      - "5125:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=CatServiceDb;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True
      - CatsApiBaseUrl=https://api.thecatapi.com/
      - xApiKey=${CAT_API_KEY:-your-api-key-here}
    depends_on:
      sqlserver:
        condition: service_healthy

volumes:
  sqlserver-data:
